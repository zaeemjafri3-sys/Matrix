<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>matrix rain</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
            height: 100%;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        window.addEventListener('resize', resizeCanvas);

        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize); // Make dynamic
        const drops = Array(columns).fill(1);
        const matrixChars = "ZAEEM JAFRI ".split('');
        const columnCharIndex = Array(columns).fill(0);

        function drawMatrix() {
            // Update columns on resize
            const newColumns = Math.floor(canvas.width / fontSize);
            if (newColumns !== columns) {
                columns = newColumns;
                // Resize arrays
                while (drops.length < columns) {
                    drops.push(1);
                    columnCharIndex.push(0);
                }
                while (drops.length > columns) {
                    drops.pop();
                    columnCharIndex.pop();
                }
            }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars[columnCharIndex[i] % matrixChars.length];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (columnCharIndex[i] >= matrixChars.length) {
                    columnCharIndex[i] = 0;
                }
                columnCharIndex[i]++;

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);
    </script>
</body>
</html>
